<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Lesson Inquiry — Tom Shields Aquatics</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<meta name="robots" content="noindex, nofollow">
<style>
  :root {
    --navy: #2a3b4f;
    --deep: #1e2d3e;
    --gold: #fec725;
    --white: #f0f4f8;
    --muted: #8aabb8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--deep); color: var(--white); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; display: flex; flex-direction: column; }

  nav {
    display: flex; justify-content: center; align-items: center;
    padding: 24px 48px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .wrap-img {
    overflow: hidden;
    height: 380px;
    flex-shrink: 0;
  }
  .wrap-img img {
    width: 100%; height: 100%;
    object-fit: cover; object-position: center 30%;
    filter: brightness(0.75);
  }
  .wrap-form {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 48px;
  }

  .form-box {
    width: 100%;
    max-width: 600px;
  }

  .page-label { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
  .page-title { font-family: 'Bebas Neue', sans-serif; font-size: 56px; letter-spacing: 2px; line-height: 1; color: var(--white); margin-bottom: 12px; }
  .page-sub { font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 48px; }

  .form-group { margin-bottom: 24px; }
  .form-group label {
    display: block; font-size: 10px; letter-spacing: 3px;
    text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 300;
    padding: 14px 16px; outline: none;
    transition: border-color 0.2s;
    appearance: none;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: var(--gold); }
  .form-group select option { background: var(--navy); }
  .form-group textarea { resize: vertical; min-height: 100px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

  .submit-btn {
    width: 100%; padding: 16px;
    background: var(--gold); color: var(--deep);
    border: none; font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 500; letter-spacing: 3px;
    text-transform: uppercase; cursor: pointer;
    transition: background 0.2s; margin-top: 8px;
  }
  .submit-btn:hover { background: #ffd54f; }

  .success-msg {
    display: none; text-align: center; padding: 60px 20px;
  }
  .success-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 40px; color: var(--gold); letter-spacing: 2px; margin-bottom: 12px;
  }
  .success-sub { font-size: 14px; color: var(--muted); line-height: 1.7; }

  footer {
    padding: 24px 48px;
    border-top: 1px solid rgba(255,255,255,0.06);
    text-align: center;
    font-size: 12px; color: rgba(122,154,170,0.4); letter-spacing: 1px;
  }

  @media (max-width: 600px) {
    .form-row { grid-template-columns: 1fr; }
    .page-title { font-size: 42px; }
  }
</style>
</head>
