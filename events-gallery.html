<style>
  :root {
    --navy: #2a3b4f;
    --deep: #1e2d3e;
    --gold: #fec725;
    --gold-dim: #d4a500;
    --white: #f0f4f8;
    --muted: #8aabb8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { background: var(--deep); color: var(--white); font-family: 'DM Sans', sans-serif; font-weight: 300; overflow-x: hidden; }
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; justify-content: space-between; align-items: center;
    padding: 20px 48px;
    background: linear-gradient(to bottom, rgba(30,45,62,0.97) 0%, transparent 100%);
  }
  .nav-logo-img { display: flex; align-items: center; text-decoration: none; }
  nav ul { list-style: none; display: flex; gap: 36px; }
  nav ul a { color: var(--muted); text-decoration: none; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; transition: color 0.2s; }
  nav ul a:hover, nav ul a.active { color: var(--gold); }
  .hamburger { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 4px; }
  .hamburger span { display: block; width: 24px; height: 2px; background: var(--white); transition: 0.3s; }
  .mobile-menu { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--deep); z-index: 200; flex-direction: column; align-items: center; justify-content: center; gap: 32px; }
  .mobile-menu.open { display: flex; }
  .mobile-menu a { color: var(--white); text-decoration: none; font-size: 24px; letter-spacing: 3px; text-transform: uppercase; }
  footer {
    background: var(--deep); border-top: 1px solid rgba(255,255,255,0.06);
    padding: 40px 48px; display: flex; justify-content: space-between;
    align-items: center; flex-wrap: wrap; gap: 16px;
  }
  .footer-copy { font-size: 12px; color: rgba(122,154,170,0.5); letter-spacing: 1px; }
  @media (max-width: 900px) {
    nav { padding: 16px 24px; }
    nav ul { display: none; }
    .hamburger { display: flex; }
    footer { padding: 32px 24px; flex-direction: column; text-align: center; }
  }
</style>
<style>
  .page-header {
    padding: 160px 48px 80px;
    max-width: 1200px; margin: 0 auto;
  }
  .page-eyebrow {
    font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
    color: var(--gold); margin-bottom: 20px;
  }
  .page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(56px, 8vw, 96px);
    line-height: 0.9; letter-spacing: 2px;
    color: var(--white); margin-bottom: 24px;
  }
  .events-grid {
    max-width: 1200px; margin: 0 auto;
    padding: 0 48px 120px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 32px;
  }
  .event-card {
    text-decoration: none;
    display: flex; flex-direction: column;
    border-top: 3px solid var(--gold);
    background: var(--navy);
    transition: background 0.2s;
  }
  .event-card:hover { background: rgba(254,199,37,0.06); }
  .event-card-thumb {
    aspect-ratio: 16/9; overflow: hidden;
    background: rgba(255,255,255,0.04);
  }
  .event-card-thumb img {
    width: 100%; height: 100%;
    object-fit: cover; filter: brightness(0.85);
    transition: transform 0.4s;
  }
  .event-card:hover .event-card-thumb img { transform: scale(1.03); filter: brightness(1); }
  .event-card-body { padding: 28px 28px 32px; flex: 1; display: flex; flex-direction: column; }
  .event-card-meta {
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--gold); margin-bottom: 10px;
  }
  .event-card-title {
    font-family: 'DM Serif Display', serif;
    font-size: 20px; color: var(--white); margin-bottom: 16px; flex: 1;
  }
  .event-card-link {
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--gold); display: inline-flex; align-items: center; gap: 8px;
  }
  .event-card-link::after { content: '→'; }
  @media (max-width: 900px) {
    .page-header { padding: 120px 24px 60px; }
    .events-grid { grid-template-columns: 1fr; padding: 0 24px 80px; }
  }
</style>
</head>
